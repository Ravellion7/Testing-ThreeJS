<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crownfall - Credits</title>
    <link rel="icon" href="../Images/CROWNFALL.png" type="image/png">
    <link rel="stylesheet" href="../CSS/credits.css">
</head>
<body>
    <!-- Background layers -->
    <div class="bg-overlay"></div>
    <div class="scanlines"></div>
    
    <!-- Main container -->
    <div class="credits-container">
        <!-- Header -->
        <div class="credits-header">
            <h1 class="credits-title">CREDITS</h1>
            <p class="credits-subtitle">Developed by</p>
        </div>
        
        <!-- Credits content -->
        <div class="credits-content">
            
            <!-- Game title -->
            <div class="game-info">
                <h2 class="game-name">
                    <img src="../Images/CROWNFALL.png" alt="Crownfall Logo" class="game-logo-small">
                    <span>CROWNFALL</span>
                </h2>
                <p class="game-tagline">Arena Survival Multiplayer</p>
            </div>
            
            <!-- Development team -->
            <div class="team-section">
                <h3 class="section-title">Development Team</h3>
                
                <div class="team-members">
                    
                    <div class="team-member">
                        <div class="member-icon"><img src="../Images/swords cross.png" alt="Swords Cross"></div>
                        <div class="member-info">
                            <div class="member-name">Leonardo Gabriel García Núñez</div>
                            <div class="member-id">1895122</div>
                        </div>
                    </div>
                    
                    <div class="team-member">
                        <div class="member-icon"><img src="../Images/shield.png" alt="Shield"></div>
                        <div class="member-info">
                            <div class="member-name">Yahir Alejandro Acosta Beltrán</div>
                            <div class="member-id">2128704</div>
                        </div>
                    </div>
                    
                    <div class="team-member">
                        <div class="member-icon"><img src="../Images/koth.png" alt="King of the Hill"></div>
                        <div class="member-info">
                            <div class="member-name">Alan Gabriel Salas Ramírez</div>
                            <div class="member-id">1953499</div>
                        </div>
                    </div>
                    
                </div>
            </div>
            
            <!-- Additional info -->
            <div class="additional-info">
                <p class="copyright">© 2026 Crownfall Development Team</p>
                <p class="thanks">Thank you for playing!</p>
            </div>
            
        </div>
        
        <!-- Back button -->
        <div class="credits-actions">
            <button class="action-btn back-btn" id="back-btn">
                <span class="btn-text">Back to Menu</span>
            </button>
        </div>
    </div>
    
    <script src="../JS/credits.js"></script>
</body>
</html>
